version: '3.8'

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drg_maskapai_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=drg_maskapai_penerbangan
      - DB_USERNAME=maskapai_user
      - DB_PASSWORD=maskapai_password
    networks:
      - drg-maskapai-network
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: drg_maskapai_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - drg-maskapai-network

  mysql:
    image: mysql:8.0
    container_name: drg_maskapai_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: drg_maskapai_penerbangan
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: maskapai_user
      MYSQL_PASSWORD: maskapai_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - drg-maskapai-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: drg_maskapai_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpassword
      UPLOAD_LIMIT: 100M
    depends_on:
      - mysql
    networks:
      - drg-maskapai-network

volumes:
  mysql_data:
    driver: local

networks:
  drg-maskapai-network:
    driver: bridge