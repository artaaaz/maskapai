# ============================================
# Docker Compose - UKK Maskapai Penerbangan
# ============================================
# Laravel 11 | PHP 8.3 | MySQL 8 | Nginx Alpine
# ============================================

services:

  # ==========================================
  # Laravel App Instance 1
  # ==========================================
  app1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drg_maskapai_app_1
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - storage-ujikom:/var/www/storage
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=drg_maskapai_penerbangan
      - DB_USERNAME=maskapai_user
      - DB_PASSWORD=maskapai_password
    networks:
      - network-ujikom
    depends_on:
      mysql:
        condition: service_healthy

  # ==========================================
  # Laravel App Instance 2
  # ==========================================
  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drg_maskapai_app_2
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - storage-ujikom:/var/www/storage
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=drg_maskapai_penerbangan
      - DB_USERNAME=maskapai_user
      - DB_PASSWORD=maskapai_password
    networks:
      - network-ujikom
    depends_on:
      mysql:
        condition: service_healthy

  # ==========================================
  # Laravel App Instance 3
  # ==========================================
  app3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drg_maskapai_app_3
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - storage-ujikom:/var/www/storage
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=drg_maskapai_penerbangan
      - DB_USERNAME=maskapai_user
      - DB_PASSWORD=maskapai_password
    networks:
      - network-ujikom
    depends_on:
      mysql:
        condition: service_healthy

  # ==========================================
  # Nginx Load Balancer
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: drg_maskapai_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app1
      - app2
      - app3
    networks:
      - network-ujikom

  # ==========================================
  # MySQL Database
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: drg_maskapai_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: drg_maskapai_penerbangan
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: maskapai_user
      MYSQL_PASSWORD: maskapai_password
    ports:
      - "3306:3306"
    volumes:
      - volume-ujikom:/var/lib/mysql
    networks:
      - network-ujikom
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================
  # phpMyAdmin
  # ==========================================
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: drg_maskapai_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpassword
      UPLOAD_LIMIT: 100M
    depends_on:
      - mysql
    networks:
      - network-ujikom

# ==========================================
# Volumes
# ==========================================
volumes:
  # Volume untuk MySQL database files
  volume-ujikom:
    driver: local

  # Volume untuk Laravel storage (terpisah dari MySQL)
  storage-ujikom:
    driver: local

# ==========================================
# Networks
# ==========================================
networks:
  network-ujikom:
    driver: bridge