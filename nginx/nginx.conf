# ============================================
# Nginx Configuration - Load Balancer
# ============================================
# UKK: Sistem Informasi Maskapai Penerbangan
# ============================================

upstream laravel_apps {
    # Load balancing method: round robin (default)
    # Distributes requests evenly across all Laravel instances
    server app1:9000;
    server app2:9000;
    server app3:9000;
}

server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    index index.php index.html;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_proxied any;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Laravel Routes
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP Processing - Forward to Load Balancer
    location ~ \.php$ {
        fastcgi_pass laravel_apps;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # Static Files Cache
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri /index.php?$query_string;
    }

    # Deny Access to Hidden Files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny Access to Sensitive Files
    location ~ (\.env|\.git|composer\.json|composer\.lock|package\.json|package-lock\.json|yarn\.lock|artisan) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Storage Access
    location ~ ^/storage/ {
        try_files $uri /index.php?$query_string;
    }

    # Error Pages
    error_page 404 /index.php;
    error_page 500 502 503 504 /index.php;

    # Access & Error Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}